<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castle Animation Banner</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a
    class="banner-link"
    href="https://castleanimation.com/"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Visit Castle Animation"
  >
    <div class="banner" role="img" aria-label="Castle Animation banner ad">
      <div class="frame frame-1 active">
        <div class="text-block">
          <h1><span>Creative</span> <span>Kids?</span></h1>
        </div>
        <div class="graphic-block">
          <img src="images/castleAnim3.png" alt="Castle Animation graphic" />
        </div>
      </div>

      <div class="frame frame-2">
        <div class="text-block">
          <h2><span>Learn</span> <span>Stop</span> <span>Motion</span></h2>
        </div>
      </div>

      <div class="frame frame-3">
        <div class="text-block">
          <h2><span>Fun.</span> <span>Hands</span><span>-</span><span>on</span><span>.</span><span>Creative</span><span>.</span></h2>
        </div>
      </div>

      <div class="frame frame-4 cta-frame">
        <div class="text-block">
          <h2><span>Castle</span> <span>Animation</span></h2>
          <div class="cta">Learn More</div>
        </div>
      </div>
    </div>
  </a>

  <script src="script.js"></script>
</body>
</html>
